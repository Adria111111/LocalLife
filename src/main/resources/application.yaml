server:
  port: 8081

spring:
  application:
    name: locallife
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/LocalLife?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&useUnicode=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
  redis:
    host: 127.0.0.1
    port: 6379
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  rabbitmq:
    # RabbitMQ 连接信息使用环境变量覆盖，避免把真实密码提交到 GitHub
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

    # correlated：生产者可以知道某条消息是否被 RabbitMQ Broker 接收
    publisher-confirm-type: correlated

    # 消息到达交换机却找不到队列时，把消息退回生产者
    publisher-returns: true
    template:
      mandatory: true

    listener:
      simple:
        # 消费方法正常结束才自动 ACK；抛异常则视为消费失败
        acknowledge-mode: auto
        # 消费失败先重试 3 次，仍失败再进入死信队列
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1s
          multiplier: 2
          max-interval: 5s
        default-requeue-rejected: false
  jackson:
    default-property-inclusion: non_null

aliyun:
  pnvs:
    # AccessKey 不应写入代码库，请在运行环境中设置这两个环境变量
    access-key-id: ${ALIBABA_CLOUD_ACCESS_KEY_ID:}
    access-key-secret: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET:}
    endpoint: dypnsapi.aliyuncs.com
    sign-name: ${ALIYUN_PNVS_SIGN_NAME:恒创联众}
    template-code: ${ALIYUN_PNVS_TEMPLATE_CODE:100001}
    valid-time-seconds: 120
    send-interval-seconds: 60
  bailian:
    # 百炼 API Key 与短信 AccessKey 不是同一种密钥，只能通过环境变量注入，禁止写进代码库
    api-key: ${DASHSCOPE_API_KEY:}
    # 使用阿里云百炼华北 2（北京）的 OpenAI 兼容接口；其他地域可通过环境变量覆盖
    base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    model-name: ${DASHSCOPE_MODEL_NAME:qwen-plus}
    temperature: 0.3
    timeout-seconds: 30
    max-retries: 2
    # Redis 只保存最近若干条消息，并自动过期，避免对话历史和 Token 无限增长
    max-history-messages: 10
    memory-ttl-minutes: 30
    max-message-length: 1000

shop:
  # 附近商户搜索半径（米）
  nearby-radius-meters: 5000
  cache:
    # Caffeine 是单个应用实例里的一级缓存；限制容量，避免商户数据无限占用 JVM 内存
    caffeine-max-size: 1000
    # 一级缓存时间要短于 Redis，过期后可以从共享的二级缓存重新获取较新的数据
    caffeine-expire-minutes: 5
  bloom-filter:
    # 可以临时关闭布隆过滤器；关闭或初始化失败时，查询会安全降级到原缓存链路
    enabled: true
    # 预计最多保存的商户 ID 数量，应明显大于当前数据库商户总数
    expected-insertions: 100000
    # 允许 1% 的误判；误判只会继续查询缓存和数据库，不会返回错误商户
    false-probability: 0.01

amap:
  # 高德 Web 服务 Key 不应写入代码库
  web-api-key: ${AMAP_WEB_API_KEY:}

mybatis-plus:
  type-aliases-package: com.hmdp.entity

logging:
  level:
    com.hmdp: debug
